org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false

# Pin the NDK used by the rive_common plugin to the version installed on this
# machine. Without this, rive defaults to 25.1.8937393, which may be missing or
# only partially downloaded and breaks the release build (CXX1101).
rive.ndk.version=28.2.13676358

# NDK 28 dropped support for Android API < 21. The rive_common plugin still
# declares minSdk 19, which the NDK rejects (CXX1110). The app's effective
# minSdk is 21+, so treat 21 as the floor for native builds.
android.ndk.suppressMinSdkVersionError=21
